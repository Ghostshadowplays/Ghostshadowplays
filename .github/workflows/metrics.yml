name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Ghostshadowplays
          template: classic

          base: header, activity, community, repositories, metadata

          config_timezone: Europe/London
          setup_community_templates: yes

          filename: metrics.svg

          # ----------------------------
          # CORE VISUAL ENHANCEMENTS
          # ----------------------------

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

          plugin_followup: yes

          plugin_lines: yes

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: 100

          plugin_stars: yes
          plugin_stars_limit: 6

          plugin_repositories: yes
          repositories_affiliations: owner

          plugin_gists: yes

          # ----------------------------
          # GITHUB INSIGHTS
          # ----------------------------

          plugin_activity: yes

          plugin_notable: yes

          plugin_traffic: yes

          # ----------------------------
          # STREAKS (replacement-safe)
          # ----------------------------

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes

          # ----------------------------
          # TWITCH (MODERN FORMAT)
          # ----------------------------

          plugin_twitch: yes
          plugin_twitch_user: ghostshadow_plays
          plugin_twitch_sections: streams, videos
          plugin_twitch_limit: 5

          # ----------------------------
          # NOTES (FIXED: renamed system)
          # ----------------------------

          plugin_notes: yes
          plugin_notes_title: "Auto-generated every 12 hours • Ghostshadow Metrics"

name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Ghostshadowplays
          template: classic
          base: header, activity, community, repositories, metadata

          # Notes
          plugin_notes: yes
          plugin_notes_text: "Auto‑generated every 12 hours • Ghostshadow Metrics"

          # Commit calendar
          plugin_calendar: yes
          plugin_calendar_look: classic

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

          # WakaTime
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}

          # Follow-up metrics
          plugin_followup: yes

          # Habits
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Lines of code
          plugin_lines: yes

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: 100

          # Streaks (correct name)
          plugin_streaks: yes

          filename: metrics.svg

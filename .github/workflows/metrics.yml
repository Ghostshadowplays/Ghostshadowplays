# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (every 3 hours)
  schedule: [{cron: "0 */3 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: metrics-update
      cancel-in-progress: true
    steps:
      - uses: lowlighter/metrics@master
        with:
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          #  - read:user
          #  - read:org
          #  - repo
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          token: ${{ secrets.GH_PAT }}

          # Enable plugin system
          plugins_errors_fatal: no
        
          # Base panels
          user: Ghostshadowplays
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/London

          # Introduction (Joined GitHub, followers, orgs, etc.)
          plugin_introduction: yes
          plugin_introduction_title: yes

          # People (followers / following)
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28

          # Repositories (stars, forks, watchers)
          plugin_repositories: yes
          plugin_repositories_affiliations: owner, collaborator

          # Gists
          plugin_gists: yes

          # Starlists (stars you've given)
          plugin_starlists: yes

          # Discussions
          plugin_discussions: yes
          plugin_discussions_categories_limit: 8

          # Topics (language activity style)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # Code snippet stats
          plugin_code: yes
          plugin_code_languages: yes
          plugin_code_load: 400

          # GitHub contributions calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Habits
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 7
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # WakaTime (sorted automatically by time)
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_limit: 5
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: current
          plugin_wakatime_languages_other: yes

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

          # Follow-up metrics
          plugin_followup: yes

          # Lines of code
          plugin_lines: yes

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: compact

          # Output file
          filename: metrics.svg

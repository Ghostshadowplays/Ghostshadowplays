name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Base panels
          user: Ghostshadowplays
          template: classic
          base: header, activity, community, repositories, metadata

          # Introduction (Joined GitHub, followers, orgs, etc.)
          plugin_introduction: yes
          plugin_introduction_title: yes

          # Activity (commits, PRs, issues, comments)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: all

          # People (followers / following)
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28

          # Repositories (stars, forks, watchers)
          plugin_repositories: yes
          repositories_affiliations: owner, collaborator

          # Gists
          plugin_gists: yes

          # Starlists (stars you’ve given)
          plugin_starlists: yes

          # Discussions
          plugin_discussions: yes
          plugin_discussions_categories_limit: 8

          # Projects activity (like Chris Titus)
          plugin_projects: yes
          plugin_projects_limit: 4

          # Topics (language activity style)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # Code snippet stats
          plugin_code: yes
          plugin_code_languages: yes
          plugin_code_load: 400

          # Commit calendar (3D)
          plugin_calendar: yes
          plugin_calendar_type: classic

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

          # Follow-up metrics
          plugin_followup: yes

          # Lines of code
          plugin_lines: yes

          # Streaks
          plugin_streak: yes

          # Output file
          filename: metrics.svg

name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Enable plugin system
          plugins_errors_fatal: yes

          # Base panels
          user: Ghostshadowplays
          template: classic
          base: header, community, repositories, metadata

          # Introduction
          plugin_introduction: yes
          plugin_introduction_title: yes

          # People
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 28

          # Repositories
          plugin_repositories: yes
          plugin_repositories_affiliations: owner, collaborator

          # Gists
          plugin_gists: yes

          # Starlists
          plugin_starlists: yes

          # Discussions
          plugin_discussions: yes
          plugin_discussions_categories_limit: 8

          # Topics
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # Code
          plugin_code: yes
          plugin_code_languages: yes
          plugin_code_load: 400

          # Contributions Calendar
          plugin_calendar: yes
          plugin_calendar_type: classic
          plugin_calendar_limit: 1
          plugin_calendar_sections: commits
          plugin_calendar_colors: "0: #161b22, 1: #0e4429, 2: #006d32, 3: #26a641, 4: #39d353"
          plugin_calendar_legend: yes

          # ⭐ 3D Contributions Skyline
          plugin_skyline: yes
          plugin_skyline_year: current

          # WakaTime
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, projects, languages, editors, os
          plugin_wakatime_limit: 5
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: current
          plugin_wakatime_languages_other: yes

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

          # Follow-up metrics
          plugin_followup: yes

          # Lines of code
          plugin_lines: yes

          # Streaks
          plugin_streak: yes

          # Output
          filename: metrics.svg
